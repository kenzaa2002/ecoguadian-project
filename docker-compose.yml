version: "3.9"

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ecoguardian
      POSTGRES_PASSWORD: ecoguardian
      POSTGRES_DB: ecoguardian
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecoguardian"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ─────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://ecoguardian:ecoguardian@db:5432/ecoguardian
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-in-production}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      DEBUG: "false"
    volumes:
      # Mount your trained model files
      - ./backend/app/ml/models:/app/app/ml/models:ro
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
